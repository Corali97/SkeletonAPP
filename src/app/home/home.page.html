<ion-header translucent>
  <ion-toolbar>
    <ion-title>
      <span class="toolbar-kicker">Home</span>
      <strong #homeTitle>Hola, {{ usuario }}</strong>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button aria-label="Cerrar sesion" (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>
  <main class="content-space">
    <ion-card class="welcome-card">
      <ion-card-content>
        <ion-icon name="school-outline" aria-hidden="true"></ion-icon>
        <div>
          <p class="eyebrow">Usuario activo</p>
          <h2>{{ usuario }}</h2>
        </div>
      </ion-card-content>
    </ion-card>

    <ion-segment [value]="selectedSegment" (ionChange)="setSegment($event.detail.value)">
      <ion-segment-button value="mis-datos">
        <ion-icon name="person-outline"></ion-icon>
        <ion-label>Mis Datos</ion-label>
      </ion-segment-button>
      <ion-segment-button value="experiencia">
        <ion-icon name="briefcase-outline"></ion-icon>
        <ion-label>Experiencia</ion-label>
      </ion-segment-button>
      <ion-segment-button value="certificaciones">
        <ion-icon name="document-text-outline"></ion-icon>
        <ion-label>Certificaciones</ion-label>
      </ion-segment-button>
    </ion-segment>

    <section class="segment-content">
      <app-mis-datos *ngIf="selectedSegment === 'mis-datos'"></app-mis-datos>
      <app-experiencia-laboral *ngIf="selectedSegment === 'experiencia'"></app-experiencia-laboral>
      <app-certificaciones *ngIf="selectedSegment === 'certificaciones'"></app-certificaciones>
    </section>

    <ion-card class="exercise-link" routerLink="/ejercicios" button>
      <ion-card-content>
        <ion-icon name="barbell-outline" aria-hidden="true"></ion-icon>
        <ion-label>
          <strong>Ejercicios</strong>
          <span>Ver y modificar rutina base</span>
        </ion-label>
      </ion-card-content>
    </ion-card>

    <ion-card class="exercise-link" routerLink="/progreso" button>
      <ion-card-content>
        <ion-icon name="school-outline" aria-hidden="true"></ion-icon>
        <ion-label>
          <strong>Progreso</strong>
          <span>Revisar avance semanal</span>
        </ion-label>
      </ion-card-content>
    </ion-card>

    <ion-card class="exercise-link" routerLink="/api-connection" button>
      <ion-card-content>
        <ion-icon name="cloud-outline" aria-hidden="true"></ion-icon>
        <ion-label>
          <strong>API Connection</strong>
          <span>GET, POST, PUT y DELETE</span>
        </ion-label>
      </ion-card-content>
    </ion-card>

    <ion-card class="exercise-link" routerLink="/mapa" button>
      <ion-card-content>
        <ion-icon name="map-outline" aria-hidden="true"></ion-icon>
        <ion-label>
          <strong>Mapa</strong>
          <span>Ver geolocalizacion actual</span>
        </ion-label>
      </ion-card-content>
    </ion-card>

    <ion-card class="exercise-link" routerLink="/camara" button>
      <ion-card-content>
        <ion-icon name="camera-outline" aria-hidden="true"></ion-icon>
        <ion-label>
          <strong>Cámara</strong>
          <span>Tomar o cargar una foto</span>
        </ion-label>
      </ion-card-content>
    </ion-card>
  </main>
</ion-content>
