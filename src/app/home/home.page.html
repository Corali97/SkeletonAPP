<ion-header translucent>
  <ion-toolbar>
    <ion-title>
      <span class="toolbar-kicker">AgendaFit</span>
      <strong>Hola, {{ userName }}</strong>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button aria-label="Cerrar sesion" (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>
  <main class="content-space">
    <ion-card #heroCard class="hero-card">
      <ion-card-content>
        <ion-icon name="fitness-outline" aria-hidden="true"></ion-icon>
        <div>
          <ion-note>Proyecto Ionic Angular</ion-note>
          <h2>Entrenamiento simple en casa</h2>
          <p>Organiza rutinas cortas, registra avances y mantén una meta semanal de {{ weeklyGoal }} sesiones.</p>
        </div>
      </ion-card-content>
    </ion-card>

    <section class="shortcut-grid">
      <ion-card class="shortcut-card" *ngFor="let item of shortcuts" [routerLink]="item.route" button>
        <ion-card-content>
          <ion-icon [name]="item.icon" aria-hidden="true"></ion-icon>
          <ion-label>
            <strong>{{ item.title }}</strong>
            <span>{{ item.note }}</span>
          </ion-label>
        </ion-card-content>
      </ion-card>
    </section>
  </main>
</ion-content>
