<ion-header translucent>
  <ion-toolbar>
    <ion-title>
      <span class="toolbar-kicker">Home</span>
      <strong #homeTitle>Hola, {{ usuario }}</strong>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button aria-label="Cerrar sesion" (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>
  <main class="content-space">
    <ion-card class="welcome-card">
      <ion-card-content>
        <ion-icon name="school-outline" aria-hidden="true"></ion-icon>
        <div>
          <p class="eyebrow">Usuario recibido desde Login</p>
          <h2>{{ usuario }}</h2>
        </div>
      </ion-card-content>
    </ion-card>

    <form [formGroup]="form" class="data-form">
      <ion-list lines="none">
        <ion-item #nombreField>
          <ion-input label="Nombre" label-placement="stacked" placeholder="Ingresa tu nombre" formControlName="nombre"></ion-input>
        </ion-item>

        <ion-item #apellidoField>
          <ion-input label="Apellido" label-placement="stacked" placeholder="Ingresa tu apellido" formControlName="apellido"></ion-input>
        </ion-item>

        <ion-item>
          <ion-select label="Nivel de educacion" label-placement="stacked" formControlName="nivelEducacion">
            <ion-select-option *ngFor="let nivel of nivelesEducacion" [value]="nivel">
              {{ nivel }}
            </ion-select-option>
          </ion-select>
        </ion-item>

        <div class="date-field">
          <mat-form-field appearance="outline">
            <mat-label>Fecha nacimiento</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="fechaNacimiento" readonly>
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>
        </div>
      </ion-list>

      <div class="actions">
        <ion-button fill="outline" type="button" (click)="limpiar()">
          <ion-icon slot="start" name="refresh-outline"></ion-icon>
          Limpiar
        </ion-button>
        <ion-button type="button" (click)="guardar()">
          <ion-icon slot="start" name="eye-outline"></ion-icon>
          Guardar
        </ion-button>
      </div>
    </form>

    <ion-card class="exercise-link" routerLink="/ejercicios" button>
      <ion-card-content>
        <ion-icon name="barbell-outline" aria-hidden="true"></ion-icon>
        <ion-label>
          <strong>Ejercicios</strong>
          <span>Ver y modificar rutina base</span>
        </ion-label>
      </ion-card-content>
    </ion-card>

    <ion-card class="exercise-link" routerLink="/progreso" button>
      <ion-card-content>
        <ion-icon name="school-outline" aria-hidden="true"></ion-icon>
        <ion-label>
          <strong>Progreso</strong>
          <span>Revisar avance semanal</span>
        </ion-label>
      </ion-card-content>
    </ion-card>
  </main>
</ion-content>
