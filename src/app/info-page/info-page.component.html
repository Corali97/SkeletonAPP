<ion-header translucent>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button routerLink="/home" aria-label="Volver">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>
      <span class="toolbar-kicker">Proyecto</span>
      <strong>{{ title }}</strong>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>
  <main class="content-space">
    <ion-card>
      <ion-card-content>
        <p class="eyebrow">{{ subtitle }}</p>
        <ul>
          <li *ngFor="let point of points">{{ point }}</li>
        </ul>
      </ion-card-content>
    </ion-card>
  </main>
</ion-content>
