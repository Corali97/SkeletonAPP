<ion-content fullscreen class="login-content">
  <section class="login-wrap">
    <div #brandMark class="brand-mark" aria-hidden="true">
      <ion-icon name="person-circle-outline"></ion-icon>
    </div>

    <p class="eyebrow">SkeletonAPP</p>
    <h1>Login</h1>
    <p class="intro">Ingresa tus datos para continuar al Home.</p>

    <ion-card>
      <ion-card-content>
        <form [formGroup]="form" (ngSubmit)="ingresar()">
          <ion-list lines="none">
            <ion-item>
              <ion-input
                label="Usuario"
                label-placement="stacked"
                placeholder="3 a 8 caracteres"
                autocomplete="username"
                maxlength="8"
                formControlName="usuario"
              ></ion-input>
            </ion-item>
            <ion-text color="danger" *ngIf="form.controls.usuario.touched && form.controls.usuario.invalid">
              <small>El usuario debe ser alfanumerico y tener entre 3 y 8 caracteres.</small>
            </ion-text>

            <ion-item>
              <ion-input
                label="Password"
                label-placement="stacked"
                placeholder="****"
                autocomplete="current-password"
                inputmode="numeric"
                maxlength="4"
                type="password"
                formControlName="password"
              >
                <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
              </ion-input>
            </ion-item>
            <ion-text color="danger" *ngIf="form.controls.password.touched && form.controls.password.invalid">
              <small>La password debe tener exactamente 4 numeros.</small>
            </ion-text>
            <ion-text color="danger" *ngIf="form.controls.password.errors?.['invalidLogin']">
              <small>Usuario o password no registrados. Puedes usar Registrar.</small>
            </ion-text>
          </ion-list>

          <div class="login-actions">
            <ion-button expand="block" type="submit">
              Ingresar
              <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
            </ion-button>
            <ion-button expand="block" fill="outline" type="button" (click)="registrar()">
              Registrar
              <ion-icon slot="end" name="person-add-outline"></ion-icon>
            </ion-button>
          </div>
        </form>
      </ion-card-content>
    </ion-card>
  </section>
</ion-content>
