<ion-header translucent>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Mapa</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>
  <main class="content-space">
    <ion-card>
      <ion-card-content>
        <div class="map-box">
          <div class="map-grid"></div>
          <div class="map-road road-one"></div>
          <div class="map-road road-two"></div>
          <div class="map-marker" [class.is-active]="hasLocation">
            <ion-icon name="map-outline"></ion-icon>
          </div>
          <span class="map-status">{{ statusMessage }}</span>
        </div>

        <section class="coordinates">
          <p>Latitud: {{ hasLocation ? (latitude | number:'1.6-6') : 'Pendiente' }}</p>
          <p>Longitud: {{ hasLocation ? (longitude | number:'1.6-6') : 'Pendiente' }}</p>
          <p>Precision: {{ accuracy ? (accuracy | number:'1.0-0') + ' m' : 'Pendiente' }}</p>
        </section>

        <div class="actions">
          <ion-button type="button" (click)="startLocation()">
            <ion-icon slot="start" name="locate-outline"></ion-icon>
            Actualizar
          </ion-button>
          <ion-button type="button" fill="outline" (click)="stopLocation()">
            <ion-icon slot="start" name="stop-circle-outline"></ion-icon>
            Detener
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>
  </main>
</ion-content>
